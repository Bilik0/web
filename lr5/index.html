<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг сонячної електростанції</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Моніторинг сонячної електростанції (1 МВт)</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="metric-card">
                    <h3>Потужність</h3>
                    <h2 id="currentPower">-- кВт</h2>
                    <p>Статус: <span id="status">--</span></p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card">
                    <h3>Добова генерація</h3>
                    <h2 id="dailyGeneration">-- кВт·год</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card">
                    <h3>Ефективність панелей</h3>
                    <h2 id="efficiency">-- %</h2>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <div class="metric-card">
                    <h3>Освітленість</h3>
                    <h2 id="illumination">-- Вт/м²</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="metric-card">
                    <h3>Температура панелей</h3>
                    <h2 id="temperature">-- °C</h2>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-8">
                <h3>Графік потужності за 24 години</h3>
                <canvas id="powerChart"></canvas>
            </div>
            <div class="col-md-4">
                <h3>Розподіл генерації</h3>
                <canvas id="generationPieChart"></canvas>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <h3>Heat-map ефективності панелей</h3>
                <div id="heatmapChart"></div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <h3>Історія вимірювань</h3>
                <div id="dataTable"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
